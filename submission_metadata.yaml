ai_usage_summary: |
  Used AI assistants for code architecture design, pipeline logic reviews, 
  and Streamlit theme formatting edits. No candidate data was sent to any external LLM APIs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A hybrid scoring model that balances Jaccard skills overlap, years of experience, 
  degree relevance, and behavioral signals (availability metrics). 
  Features a multi-stage L1/L2 retrieval pipeline to sort 100K profiles on CPU under 1 minute.
  L1 runs fast heuristic exclusions of honeypots, service companies, and title stuffers, 
  whilst L2 runs sentence embeddings and Cross-Encoder reranking on the top 1,000 candidates.

